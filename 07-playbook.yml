- name: playbook variable perference
  hosts: local
  connection: local
  vars:
    NAME: "ansible from play"
  vars_files:
    filesread.yml
  vars_prompt:
  - name: NAME
    prompt: "please enter name"
    private: no
  tasks:
    - name: print the ansible varable perfermance
      vars:
        NAME: "ansible  from tasks"
      ansible.builtin.debug:
        msg: "{{ NAME }}"