- name: install package
  hosts:  local
  connection: local
  become: yes
  tasks:  
  - name: run install package
    ansible.builtin.package:  
      name:  "{{ item }}"
      state: present
    loop: 
    - {name: "mysql", state: "absent"}
    - {name: "nginx", state: "present"}
    - {name: "zip", state: "absent"}